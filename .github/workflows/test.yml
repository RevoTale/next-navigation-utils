name: Test
on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'
permissions:
  contents: read
jobs:
  Unit:
    name: Unit Tests (Node ${{ matrix.node-version }}, Next.js ${{ matrix.nextjs-version }}, React ${{ matrix.react-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - node-version: 20
            nextjs-version: '14.0.0'
            react-version: '18.2.0'
            react-types-version: '18'
            os: ubuntu-latest
          - node-version: 20
            nextjs-version: '14.2.30'
            react-version: '18.2.0'
            react-types-version: '18'
            os: ubuntu-latest
          - node-version: 22
            nextjs-version: '14.2.30'
            react-version: '18.2.0'
            react-types-version: '18'
            os: ubuntu-latest
          - node-version: 20
            nextjs-version: '15.0.0'
            react-version: '18.2.0'
            react-types-version: '18'
            os: ubuntu-latest
          - node-version: 22
            nextjs-version: '15.0.0'
            react-version: '18.2.0'
            react-types-version: '18'
            os: ubuntu-latest
          - node-version: 20
            nextjs-version: '15.3.4'
            react-version: '18.2.0'
            react-types-version: '18'
            os: ubuntu-latest
          - node-version: 22
            nextjs-version: '15.3.4'
            react-version: '18.2.0'
            react-types-version: '18'
            os: ubuntu-latest
          - node-version: 24
            nextjs-version: '16.2.3'
            react-version: '19.2.5'
            react-types-version: '19'
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            next-app-mock/pnpm-lock.yaml
      - run: pnpm i && pnpm build
      - name: Install framework versions
        run: |
          cd next-app-mock
          echo "Installing Next.js version ${{ matrix.nextjs-version }}"
          pnpm add next@${{ matrix.nextjs-version }} react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }}
          pnpm add -D @types/react@${{ matrix.react-types-version }} @types/react-dom@${{ matrix.react-types-version }}
          echo "Installed framework versions:"
          pnpm list next react react-dom
      - run: pnpm playwright install --with-deps
      - run: pnpm test
        env:
          CI: true
          NEXTJS_VERSION: ${{ matrix.nextjs-version }}
          REACT_VERSION: ${{ matrix.react-version }}
          NODE_VERSION: ${{ matrix.node-version }}
      - uses: actions/upload-artifact@v7
        with:
          name: my-artifacts-${{inputs.context}}-${{inputs.job-index}}-node${{ matrix.node-version }}-next${{ matrix.nextjs-version }}
          path: playwright-report/
        if: failure()
      - uses: actions/download-artifact@v8
        with:
          pattern: my-artifacts-${{inputs.context}}*
          merge-multiple: true
        if: failure()
  Lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm i
      - run: pnpm lint
  Types:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm i
      - run: pnpm tsc
  Test:
    needs: [ Lint, Unit, Types ]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Ready to merge!"
